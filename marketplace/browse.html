<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Equipment - Dozr</title>
<meta name="description" content="Browse vetted excavators, wheel loaders, cranes, dump trucks, flatbed trailers, and generators. Filter by weight, availability, and GPS tracking.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=20260710h">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
<a class="skip-link" href="#main-content">Skip to content</a>
<header class="site-nav">
  <div class="container">
    <a class="logo" href="index.html" aria-label="Dozr home">
      <div style="width:30px;height:30px;border-radius:8px;background:var(--ink);display:flex;align-items:center;justify-content:center">
        <svg width="18" height="18" viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M12 6c-2 0-3.2 1.3-3.2 3.4V18.5h4.4V11c0-1.1.5-1.7 1.5-1.7H17V6z" fill="var(--yellow)"/><path d="M14.5 14.5 21.5 18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/><circle cx="22.5" cy="20.5" r="2.6" fill="var(--yellow)"/><path d="M6.5 24H18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/></svg>
      </div><span>dozr</span>
    </a>
    <nav class="links" data-nav-menu data-open="false" aria-label="Primary">
      <a href="browse.html" aria-current="page">Equipment</a>
      <a href="freight.html" aria-current="false">Freight</a>
      <a href="index.html#how-it-works" aria-current="false">How it works</a>
      <a href="about.html" aria-current="false">About</a>
      <a href="contact.html" aria-current="false">Contact</a>
      <span class="nav-disabled" aria-disabled="true">For vendors soon</span>
    </nav>
    <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false">Menu</button>
    <a class="nav-auth" href="../dashboard/index.html" title="Internal staff access - Ops, Fleet, and Marketplace admin views">Staff sign in</a>
  </div>
  <div class="container category-tabs" id="category-tabs" aria-label="Equipment categories"></div>
</header>

<main id="main-content" class="container browse-layout">
  <h1 class="sr-only">Browse equipment</h1>
  <div class="mobile-filter-bar">
    <button type="button" class="btn btn-secondary btn-full" id="mobileFilterToggle" aria-expanded="false" aria-controls="filters">Filters</button>
  </div>
  <aside id="filters" aria-label="Filters" data-filters-open="false">
    <h2 style="font-size:16px;margin-bottom:16px">Filters</h2>
    <div class="filter-group">
      <div class="filter-title">Operating weight</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">
        <button class="chip" type="button" data-weight="up-to-6" aria-pressed="false">Up to 6T</button>
        <button class="chip" type="button" data-weight="6-20" aria-pressed="false">6-20T</button>
        <button class="chip" type="button" data-weight="20-plus" aria-pressed="false">20T+</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-title">Availability</div>
      <div class="filter-stack">
        <button class="check-row" type="button" data-availability="same-day" aria-pressed="false"><span class="fake-check"></span>Same-day</button>
        <button class="check-row" type="button" data-availability="next-day" aria-pressed="false"><span class="fake-check"></span>Next-day</button>
        <button class="check-row" type="button" data-availability="this-week" aria-pressed="false"><span class="fake-check"></span>This week</button>
      </div>
    </div>
    <div class="filter-group"><div class="filter-title">GPS tracked</div><button class="check-row" type="button" data-toggle-filter="gps" aria-pressed="false"><span class="toggle"></span>Live GPS on this unit</button></div>
    <div class="filter-group"><div class="filter-title">Verified only</div><button class="check-row" type="button" data-toggle-filter="verified" aria-pressed="false"><span class="toggle"></span>On</button></div>
  </aside>

  <section id="results" data-category-results aria-live="polite"></section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <div class="logo-box">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="none" aria-hidden="true"><path d="M12 6c-2 0-3.2 1.3-3.2 3.4V18.5h4.4V11c0-1.1.5-1.7 1.5-1.7H17V6z" fill="var(--ink)"/><path d="M14.5 14.5 21.5 18" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/><circle cx="22.5" cy="20.5" r="2.6" fill="var(--ink)"/><path d="M6.5 24H18" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/></svg>
      </div>
      <span class="footer-logotext">dozr</span>
    </div>
    <div class="footer-copy">
      &copy; 2026 Dozr. UAE construction &amp; port logistics.
    </div>
  </div>
</footer>
<script src="data/equipment.js" defer></script>
<script src="js/whatsapp.js" defer></script>
<script src="js/main.js" defer></script>
<script src="js/browse.js" defer></script>
</body>
</html>
