<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Detail - Dozr Ops</title>
<meta name="description" content="Kasper/Dozr internal vendor detail - company info, verified documents, and job history.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" type="image/svg+xml" href="../marketplace/assets/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
</head>
<body data-page="vendor-detail">
<a class="skip-link" href="#main-content">Skip to content</a>
<div class="app-shell">
  <header class="app-header">
    <a class="logo" href="index.html" aria-label="Dozr Ops home">
      <span aria-hidden="true"><svg width="20" height="20" viewBox="0 0 32 32" fill="none"><path d="M12 6c-2 0-3.2 1.3-3.2 3.4V18.5h4.4V11c0-1.1.5-1.7 1.5-1.7H17V6z" fill="var(--yellow)"/><path d="M14.5 14.5 21.5 18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/><circle cx="22.5" cy="20.5" r="2.6" fill="var(--yellow)"/><path d="M6.5 24H18" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/></svg></span>
      <span>dozr ops</span>
    </a>
    <span class="badge-internal">Internal</span>
    <button type="button" class="btn btn-ghost btn-sm" id="global-search-trigger" style="margin-left:auto;color:#fff;border-color:rgba(255,255,255,.25);">Search <span class="mono" style="opacity:.6;">⌘K</span></button>
    <a href="index.html#panel-vendors" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,.25);">&larr; Back to Vendors</a>
  </header>

  <main class="app-main" id="main-content">
    <h1 id="vendor-detail-title" style="font-size:22px;margin-bottom:var(--space-3);">Vendor detail</h1>
    <div id="vendor-detail-root"></div>
  </main>
</div>

<!-- GLOBAL SEARCH (Ctrl+K / Cmd+K) -->
<div class="modal-overlay" id="global-search-overlay" hidden>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="global-search-title" style="max-width:560px;padding:0;">
    <h2 id="global-search-title" class="sr-only">Search jobs, vendors, and invoices</h2>
    <div style="display:flex;align-items:center;gap:8px;padding:var(--space-3);border-bottom:1px solid var(--line);">
      <input type="text" id="global-search-input" placeholder="Search jobs, vendors, invoices..." autocomplete="off"
        style="flex:1;border:none;font-size:16px;font-family:inherit;background:transparent;color:var(--ink);outline:none;">
      <button type="button" class="modal-close" id="global-search-close" aria-label="Close">&times;</button>
    </div>
    <div id="global-search-results" style="max-height:360px;overflow-y:auto;"></div>
    <p class="note" style="padding:8px var(--space-3);margin:0;border-top:1px solid var(--line);">Type at least 2 characters · Esc to close</p>
  </div>
</div>

<!-- ADD EQUIPMENT MODAL -->
<div class="modal-overlay" id="equipment-modal-overlay" hidden>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="equipment-modal-title">
    <div class="modal-header">
      <h2 id="equipment-modal-title">Add equipment / vehicle</h2>
      <button type="button" class="modal-close" id="equipment-modal-close" aria-label="Close">&times;</button>
    </div>
    <form id="equipment-form" class="modal-form" novalidate>
      <div class="field-row-2">
        <div class="field-group">
          <label class="field-label" for="ef-category">Category *</label>
          <select id="ef-category" name="category" required>
            <option value="excavator">Excavator</option>
            <option value="wheel-loader">Wheel Loader</option>
            <option value="crane">Crane</option>
            <option value="flatbed">Flatbed Truck</option>
            <option value="low-bed">Low-bed Trailer</option>
            <option value="box-truck">Box Truck</option>
            <option value="dump-truck">Dump Truck</option>
            <option value="boom-lift">Boom Lift</option>
            <option value="scissor-lift">Scissor Lift</option>
            <option value="generator">Generator</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label" for="ef-availability">Availability</label>
          <select id="ef-availability" name="availability_status">
            <option value="available">Available</option>
            <option value="on_job">On job</option>
            <option value="maintenance">Maintenance</option>
          </select>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="ef-name">Name / description *</label>
        <input type="text" id="ef-name" name="name" placeholder="e.g. Crane, 60t" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="ef-plate">Plate / asset ID</label>
        <input type="text" id="ef-plate" name="plate_or_asset_id" placeholder="e.g. DXB-A-12345">
      </div>
      <div class="field-group">
        <label class="field-label" for="ef-image">Photo</label>
        <input type="file" id="ef-image" name="image" accept="image/*">
      </div>
      <div class="field-group">
        <label class="field-label" for="ef-notes">Notes</label>
        <textarea id="ef-notes" name="notes" rows="2"></textarea>
      </div>
      <p class="modal-error" id="equipment-form-error" role="alert" hidden></p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost btn-sm" id="equipment-modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary btn-sm" id="equipment-form-submit">Add equipment</button>
      </div>
    </form>
  </div>
</div>

<script src="js/supabase-client.js" defer></script>
<script src="data/ops.js" defer></script>
<script src="js/main.js" defer></script>
</body>
</html>
